<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RAJ MODS | HATKE v9.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #ff4d4d; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        html, body { 
            background: var(--bg); color: #fff; font-family: 'SF Pro Display', -apple-system, sans-serif; 
            height: 100%; width: 100%; overflow: hidden; position: fixed; 
        }

        svg { display: block; } 

        /* --- 1. LOBBY SCREEN --- */
        #lobby-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0a0a 0%, #050505 100%);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .lobby-box {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
            text-align: center; width: 85%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .lobby-box h2 { color: var(--accent); letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        
        .lobby-id-box {
            background: #111; border: 1px dashed #444; border-radius: 10px;
            padding: 12px; margin-bottom: 20px; font-size: 0.85rem; color: #aaa;
            display: flex; justify-content: space-between; align-items: center;
        }
        .copy-btn { background: var(--accent); color: #000; border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .copy-btn:active { transform: scale(0.9); }

        .lobby-input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.4); 
            border: 2px solid #333; border-radius: 12px; color: #fff; 
            font-size: 15px; outline: none; margin-bottom: 12px; text-align: center;
        }
        .lobby-input:focus { border-color: var(--accent); }
        
        .lobby-btn { 
            width: 100%; padding: 16px; background: var(--accent); margin-top: 10px;
            border: none; border-radius: 12px; color: #000; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem;
        }

        /* --- 2. MAIN CHAT INTERFACE --- */
        #chat-screen { 
            display: none; height: 100%; width: 100%;
            flex-direction: column; position: absolute; top: 0; left: 0;
        }
        
        header { 
            padding: 15px; border-bottom: 1px solid #1a1a1a;
            background: rgba(10,10,10,0.9); font-weight: bold; color: var(--accent);
            letter-spacing: 1.5px; flex-shrink: 0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .video-call-icon {
            cursor: pointer; display: none; padding: 8px; 
            background: #222; border-radius: 50%; transition: 0.2s; color: #fff;
        }
        .video-call-icon:active { transform: scale(0.9); background: var(--accent); color: #000; }

        #chat-box { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            background: #08080a;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .msg-con { display: flex; flex-direction: column; max-width: 80%; position: relative; }
        .msg-con.me { align-self: flex-end; align-items: flex-end; }
        .msg-con.peer { align-self: flex-start; align-items: flex-start; }
        
        .msg-bubble { 
            padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; 
            word-wrap: break-word; cursor: pointer; position: relative;
        }
        .me .msg-bubble { background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .peer .msg-bubble { background: #1e1e22; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }
        
        .reaction-badge {
            position: absolute; bottom: -12px; font-size: 12px;
            background: #222; border: 1px solid #444; border-radius: 12px; 
            padding: 2px 6px; display: none; z-index: 5; align-items: center; justify-content: center; gap: 2px;
        }
        .me .reaction-badge { left: 10px; }
        .peer .reaction-badge { right: 10px; }

        .msg-info { display: flex; gap: 5px; font-size: 10px; color: #666; margin-top: 3px; padding: 0 4px; align-items: center; }
        .tick { font-weight: bold; font-size: 12px; transition: color 0.3s ease; }
        .tick.delivered { color: #888; }
        .tick.seen { color: #00a8ff; }
        
        #typing-indicator {
            display: none; align-self: flex-start; background: transparent; 
            color: #888; font-size: 0.8rem; font-style: italic; padding: 0 20px; margin-bottom: 10px;
        }
        .dots span { animation: blink 1.4s infinite both; font-weight: bold; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        .controls-area { 
            background: #0c0c0c; border-top: 1px solid #1a1a1a; 
            padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
            width: 100%; flex-shrink: 0; display: flex; gap: 10px; z-index: 10; align-items: center;
        }
        .msg-input { 
            flex: 1; background: #222; border: 1px solid #333; padding: 14px; 
            color: #fff; border-radius: 12px; outline: none; font-size: 16px; 
        }
        .send-btn { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; height: 100%; }

        /* --- 3. REACTION PICKER --- */
        #reaction-overlay {
            display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,20,0.95); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 20px; border: 1px solid #333;
            z-index: 2000; box-shadow: 0 5px 20px rgba(0,0,0,0.8);
            width: 90%; max-width: 320px; flex-direction: column;
            animation: popUp 0.2s ease-out;
        }
        @keyframes popUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        .emoji-grid {
            display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px;
            max-height: 180px; overflow-y: auto; text-align: center; padding-right: 5px;
        }
        .emoji-grid::-webkit-scrollbar { width: 3px; }
        .emoji-grid::-webkit-scrollbar-thumb { background: #555; border-radius: 2px; }
        .emoji-btn { font-size: 24px; cursor: pointer; transition: 0.2s; user-select: none; }
        .emoji-btn:active { transform: scale(1.3); }

        #dim-bg {
            display: none; position: fixed; top:0; left:0; width:100%; height:100%;
            background: transparent; z-index: 1999;
        }

        /* --- 4. VIDEO CALL UI --- */
        #video-call-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000; flex-direction: column;
        }
        #remote-video {
            width: 100%; height: 100%; object-fit: cover;
        }
        #local-video {
            position: absolute; top: env(safe-area-inset-top, 20px); right: 20px; width: 100px; height: 150px;
            object-fit: cover; border-radius: 12px; border: 2px solid #333;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index: 3001; background: #111;
        }
        .call-action-bar {
            position: absolute; bottom: calc(30px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
            display: flex; gap: 20px; z-index: 3002;
            background: rgba(20,20,20,0.7); padding: 15px 25px; border-radius: 30px; backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .call-btn {
            width: 50px; height: 50px; border-radius: 50%; border: none;
            cursor: pointer; display: flex; justify-content: center; align-items: center;
            background: #333; color: #fff; transition: 0.2s;
        }
        .call-btn:active { transform: scale(0.9); }
        .call-btn.end { background: #ff4d4d; color: #000; }
        .call-btn.disabled { background: #ff4d4d; color: #000; }

        /* Incoming Call Popup */
        #incoming-call-modal {
            display: none; position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
            background: rgba(20,20,20,0.95); border: 1px solid #333; padding: 20px;
            border-radius: 15px; z-index: 4000; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            animation: slideDown 0.3s ease-out; width: 90%; max-width: 300px;
        }
        @keyframes slideDown { from { top: -50px; opacity: 0; } to { top: 50px; opacity: 1; } }
        .incoming-btns { display: flex; gap: 15px; margin-top: 20px; justify-content: center; }
        .inc-btn { flex: 1; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 5px; }
        .inc-btn.accept { background: #00d26a; color: #000; }
        .inc-btn.reject { background: #ff4d4d; color: #000; }

        /* --- 5. CUSTOM PREMIUM ALERT BOX --- */
        #custom-alert-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .custom-alert-box {
            background: #111; border: 1px solid var(--accent); padding: 25px;
            border-radius: 16px; width: 85%; max-width: 320px; text-align: center;
            box-shadow: 0 10px 40px rgba(255, 77, 77, 0.15);
            animation: popUp 0.3s ease-out;
        }
        .custom-alert-box h3 { color: var(--accent); margin-bottom: 12px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .custom-alert-box p { color: #ddd; font-size: 14px; margin-bottom: 22px; line-height: 1.5; }
        .custom-alert-btn {
            background: var(--accent); color: #000; border: none; padding: 12px;
            border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.2s;
        }
        .custom-alert-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="custom-alert-overlay">
    <div class="custom-alert-box">
        <h3 id="custom-alert-title">Notice</h3>
        <p id="custom-alert-text">Message goes here.</p>
        <button class="custom-alert-btn" onclick="closeCustomAlert()">OK</button>
    </div>
</div>

<div id="lobby-screen">
    <div class="lobby-box">
        <h2>RAJ MODS</h2>
        <p style="color:#666; font-size: 11px; margin-bottom: 15px;">HATKE APP v9.0 | NATIVE UI</p>
        
        <div class="lobby-id-box">
            <span id="my-lobby-id">Generating Key...</span>
            <button type="button" class="copy-btn" id="copy-action-btn" onclick="copyMyID()">COPY KEY</button>
        </div>

        <input type="text" id="username-input" class="lobby-input" placeholder="Your Name" maxlength="12">
        <input type="text" id="target-id" class="lobby-input" placeholder="Partner's Key (Paste here)">
        
        <button type="button" onclick="startChat()" class="lobby-btn">START SECURE CHAT</button>
    </div>
</div>

<div id="chat-screen">
    <header>
        <span id="chat-header">HATKE SECURE (1/2)</span>
        <div class="video-call-icon" id="start-video-btn" onclick="initiateCall()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="23 7 16 12 23 17 23 7"></polygon>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
        </div>
    </header>

    <div id="chat-box"></div>
    
    <div id="typing-indicator">
        <span id="typer-name">Partner</span> is typing<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>

    <div class="controls-area">
        <input type="text" id="msg-input" class="msg-input" placeholder="Write a message..." autocomplete="off">
        <button type="button" id="send-btn" class="send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="22" y1="2" x2="11" y2="13"></line>
                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
        </button>
    </div>
</div>

<div id="dim-bg" onclick="closeReactionPicker()"></div>
<div id="reaction-overlay">
    <div class="emoji-grid" id="emoji-list"></div>
</div>

<div id="video-call-screen">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="call-action-bar">
        <button class="call-btn" id="mute-btn" onclick="toggleAudio()">
            <svg id="mic-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                <line x1="12" y1="19" x2="12" y2="23"></line>
                <line x1="8" y1="23" x2="16" y2="23"></line>
            </svg>
        </button>
        <button class="call-btn" id="cam-btn" onclick="toggleVideo()">
            <svg id="cam-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polygon points="23 7 16 12 23 17 23 7"></polygon>
                <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
        </button>
        <button class="call-btn end" onclick="endCall()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path>
                <line x1="23" y1="1" x2="1" y2="23"></line>
            </svg>
        </button>
    </div>
</div>

<div id="incoming-call-modal">
    <h3 style="margin-bottom: 5px; color: #fff;">Incoming Video Call</h3>
    <p style="font-size: 13px; color: #aaa;" id="caller-name">Partner is calling...</p>
    <div class="incoming-btns">
        <button class="inc-btn accept" onclick="acceptCall()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            Accept
        </button>
        <button class="inc-btn reject" onclick="rejectCall()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="23" y1="1" x2="1" y2="23"></line></svg>
            Reject
        </button>
    </div>
</div>

<script>
    // --- Custom Alert Logic ---
    function showCustomAlert(title, message) {
        document.getElementById('custom-alert-title').innerText = title;
        document.getElementById('custom-alert-text').innerText = message;
        document.getElementById('custom-alert-overlay').style.display = 'flex';
    }
    function closeCustomAlert() {
        document.getElementById('custom-alert-overlay').style.display = 'none';
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    let peer, myUsername, activeConnections = {}, peerIdToName = {};
    let selectedMsgIdForReaction = null, unreadMessages = [], msgReactions = {};
    let localStream = null, currentCall = null, pendingIncomingCall = null;

    const allEmojis = ["❤️","😂","😮","😢","👍","🙏","🔥","🥰","👏","😁","😎","🥳","😡","👎","🎉","💯","✨","💔","💩","👻","👀","🙌","🤔","🤫","🤯","🥶","🤡","👽","🙊","💋"];
    const emojiListDiv = document.getElementById('emoji-list');
    allEmojis.forEach(e => emojiListDiv.innerHTML += `<span class="emoji-btn" onclick="sendReaction('${e}')">${e}</span>`);

    peer = new Peer({ config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]} });
    
    peer.on('open', id => { document.getElementById('my-lobby-id').innerHTML = `<b style="color:#fff;" id="raw-id">${id}</b>`; });
    peer.on('connection', setupConnection);

    peer.on('call', (call) => {
        pendingIncomingCall = call;
        const caller = peerIdToName[call.peer] || "Partner";
        document.getElementById('caller-name').innerText = `${caller} is calling...`;
        document.getElementById('incoming-call-modal').style.display = 'block';
    });

    function copyMyID() {
        const idText = document.getElementById('raw-id').innerText;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(idText).then(showCopySuccess).catch(() => fallbackCopy(idText));
        } else fallbackCopy(idText);
    }
    function fallbackCopy(text) {
        const textArea = document.createElement("textarea"); textArea.value = text; document.body.appendChild(textArea);
        textArea.select(); 
        try { 
            document.execCommand('copy'); 
            showCopySuccess(); 
        } catch (err) { 
            showCustomAlert("Copy Failed", "Please manually copy the key: " + text); 
        }
        document.body.removeChild(textArea);
    }
    function showCopySuccess() {
        const btn = document.getElementById('copy-action-btn'); btn.innerText = "COPIED!"; btn.style.background = "#fff";
        setTimeout(() => { btn.innerText = "COPY KEY"; btn.style.background = "var(--accent)"; }, 1500);
    }

    function startChat() {
        const name = document.getElementById('username-input').value.trim();
        if(!name) return showCustomAlert("Name Required", "Bhai, enter your name before starting the chat!");
        
        myUsername = name.toUpperCase();
        const targetId = document.getElementById('target-id').value.trim();
        
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        
        if(targetId && targetId !== peer.id) setupConnection(peer.connect(targetId));
    }

    function setupConnection(conn) {
        conn.on('open', () => {
            activeConnections[conn.peer] = conn;
            conn.send({type: 'HANDSHAKE', name: myUsername});
            updateCount();
        });
        
        conn.on('data', (data) => {
            if(data.type === 'GHOST_CHAT') {
                hideTyping();
                addMsg(data.name, data.data, 'peer', data.msgId);
                conn.send({type: 'DELIVERED', msgId: data.msgId});
                if (document.visibilityState === 'visible') conn.send({type: 'READ', msgId: data.msgId});
                else unreadMessages.push(data.msgId); 
            } 
            else if(data.type === 'HANDSHAKE') { peerIdToName[conn.peer] = data.name; updateCount(); }
            else if(data.type === 'TYPING') { data.isTyping ? showTyping(data.name) : hideTyping(); }
            else if(data.type === 'DELIVERED') { markAsDelivered(data.msgId); }
            else if(data.type === 'READ') { markAsRead(data.msgId); }
            else if(data.type === 'REACTION') { updateReactionUI(data.msgId, data.name, data.emoji); }
            else if(data.type === 'CALL_ENDED') { cleanupCallUI(); } 
        });
        
        conn.on('close', () => {
            delete activeConnections[conn.peer]; updateCount(); hideTyping();
            cleanupCallUI(); 
        });
    }

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === 'visible' && unreadMessages.length > 0) sendReadReceipts();
    });
    document.getElementById('msg-input').addEventListener('focus', () => {
        if(unreadMessages.length > 0) sendReadReceipts();
    });

    function sendReadReceipts() {
        Object.values(activeConnections).forEach(c => unreadMessages.forEach(id => c.send({type: 'READ', msgId: id})));
        unreadMessages = [];
    }

    const msgInput = document.getElementById('msg-input'); let typingTimer;
    msgInput.addEventListener('input', () => {
        if(Object.keys(activeConnections).length === 0) return;
        Object.values(activeConnections).forEach(c => c.send({type: 'TYPING', isTyping: true, name: myUsername}));
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => { Object.values(activeConnections).forEach(c => c.send({type: 'TYPING', isTyping: false, name: myUsername})); }, 1500);
    });

    document.getElementById('send-btn').onclick = send;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };

    function send() {
        const text = msgInput.value.trim(); if(!text) return;
        const messageId = "msg_" + Date.now(); 
        Object.values(activeConnections).forEach(c => {
            c.send({type: 'TYPING', isTyping: false, name: myUsername});
            c.send({type: 'GHOST_CHAT', name: myUsername, data: text, msgId: messageId});
        });
        addMsg(myUsername, text, 'me', messageId); msgInput.value = "";
    }

    function addMsg(sender, text, type, msgId) {
        const box = document.getElementById('chat-box'); const div = document.createElement('div');
        div.className = `msg-con ${type}`; div.id = `con-${msgId}`;
        div.innerHTML = `
            <div class="msg-bubble" onclick="openReactionPicker('${msgId}')">
                ${text} <div class="reaction-badge" id="react-${msgId}"></div>
            </div>
            <div class="msg-info">
                <span>${sender}</span>
                ${type === 'me' ? `<span class="tick" id="tick-${msgId}">✓</span>` : ''}
            </div>`;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    function markAsDelivered(msgId) {
        const tickElement = document.getElementById(`tick-${msgId}`);
        if(tickElement && tickElement.innerText === "✓") { tickElement.innerText = "✓✓"; tickElement.classList.add('delivered'); }
    }
    function markAsRead(msgId) {
        const tickElement = document.getElementById(`tick-${msgId}`);
        if(tickElement) { tickElement.innerText = "✓✓"; tickElement.classList.add('seen'); }
    }

    function openReactionPicker(msgId) {
        selectedMsgIdForReaction = msgId; document.getElementById('reaction-overlay').style.display = 'flex';
        document.getElementById('dim-bg').style.display = 'block';
    }
    function closeReactionPicker() {
        document.getElementById('reaction-overlay').style.display = 'none'; document.getElementById('dim-bg').style.display = 'none';
        selectedMsgIdForReaction = null;
    }
    function sendReaction(emoji) {
        if(!selectedMsgIdForReaction) return;
        updateReactionUI(selectedMsgIdForReaction, myUsername, emoji);
        Object.values(activeConnections).forEach(c => c.send({type: 'REACTION', msgId: selectedMsgIdForReaction, emoji: emoji, name: myUsername}));
        closeReactionPicker();
    }
    function updateReactionUI(msgId, userName, emoji) {
        if (!msgReactions[msgId]) msgReactions[msgId] = {};
        if (msgReactions[msgId][userName] === emoji) delete msgReactions[msgId][userName];
        else msgReactions[msgId][userName] = emoji;
        renderReactions(msgId);
    }
    function renderReactions(msgId) {
        const badge = document.getElementById(`react-${msgId}`); if (!badge) return;
        const reactions = msgReactions[msgId] || {}; const usersReacted = Object.keys(reactions);
        if (usersReacted.length > 0) {
            let emojiCounts = {}; usersReacted.forEach(user => { let e = reactions[user]; emojiCounts[e] = (emojiCounts[e] || 0) + 1; });
            let displayStr = Object.keys(emojiCounts).join('');
            if (usersReacted.length > 1) displayStr += `<span style="font-size:9px; margin-left:3px; color:#aaa; font-weight:bold;">${usersReacted.length}</span>`;
            badge.innerHTML = displayStr; badge.style.display = 'flex';
        } else badge.style.display = 'none';
    }

    function showTyping(name) {
        document.getElementById('typer-name').innerText = name; document.getElementById('typing-indicator').style.display = 'block';
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }
    function hideTyping() { document.getElementById('typing-indicator').style.display = 'none'; }

    function updateCount() {
        const count = Object.keys(activeConnections).length;
        document.getElementById('chat-header').innerText = `HATKE SECURE (${count + 1}/2)`;
        document.getElementById('start-video-btn').style.display = count > 0 ? 'block' : 'none';
    }

    // --- UPDATED VIDEO CALL FUNCTION WITH CUSTOM ALERTS ---
    async function getMediaStream() {
        try {
            return await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        } catch (err) {
            console.error("Media Error:", err);
            if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                showCustomAlert("Permission Denied", "Bhai, browser ki Site Settings me ja kar Camera aur Mic ko 'Allow' karo!");
            } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                showCustomAlert("Hardware Missing", "Device me Camera ya Mic detect nahi ho raha.");
            } else if (err.name === 'NotReadableError' || err.name === 'TrackStartError') {
                showCustomAlert("Camera Busy", "Camera pehle se kisi aur app me open hai. Use band karo.");
            } else {
                showCustomAlert("Connection Error", "Secure connection (HTTPS) required for Video Call.");
            }
            return null;
        }
    }

    async function initiateCall() {
        const peerId = Object.keys(activeConnections)[0]; 
        if(!peerId) return showCustomAlert("No Partner", "Bhai pehle kisi dost ko connect karo!");

        localStream = await getMediaStream();
        if(!localStream) return;

        document.getElementById('local-video').srcObject = localStream;
        document.getElementById('video-call-screen').style.display = 'flex';

        currentCall = peer.call(peerId, localStream);
        setupCallEvents(currentCall);
    }

    async function acceptCall() {
        document.getElementById('incoming-call-modal').style.display = 'none';
        localStream = await getMediaStream();
        
        if(!localStream) {
            pendingIncomingCall.close();
            return;
        }

        document.getElementById('local-video').srcObject = localStream;
        document.getElementById('video-call-screen').style.display = 'flex';

        currentCall = pendingIncomingCall;
        currentCall.answer(localStream); 
        setupCallEvents(currentCall);
    }

    function rejectCall() {
        document.getElementById('incoming-call-modal').style.display = 'none';
        if(pendingIncomingCall) pendingIncomingCall.close();
        Object.values(activeConnections).forEach(c => c.send({type: 'CALL_ENDED'}));
    }

    function setupCallEvents(call) {
        call.on('stream', (remoteStream) => {
            document.getElementById('remote-video').srcObject = remoteStream;
        });
        call.on('close', cleanupCallUI);
    }

    function endCall() {
        if(currentCall) currentCall.close();
        Object.values(activeConnections).forEach(c => c.send({type: 'CALL_ENDED'}));
        cleanupCallUI();
    }

    function cleanupCallUI() {
        document.getElementById('video-call-screen').style.display = 'none';
        document.getElementById('incoming-call-modal').style.display = 'none';
        
        if(localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        currentCall = null;
        pendingIncomingCall = null;
        document.getElementById('remote-video').srcObject = null;
        document.getElementById('local-video').srcObject = null;
    }

    function toggleAudio() {
        if(localStream) {
            const audioTrack = localStream.getAudioTracks()[0];
            audioTrack.enabled = !audioTrack.enabled;
            const btn = document.getElementById('mute-btn');
            if(audioTrack.enabled) { 
                btn.classList.remove('disabled');
                document.getElementById('mic-icon').innerHTML = `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line>`;
            } else { 
                btn.classList.add('disabled');
                document.getElementById('mic-icon').innerHTML = `<line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line>`;
            }
        }
    }

    function toggleVideo() {
        if(localStream) {
            const videoTrack = localStream.getVideoTracks()[0];
            videoTrack.enabled = !videoTrack.enabled;
            const btn = document.getElementById('cam-btn');
            if(videoTrack.enabled) { 
                btn.classList.remove('disabled');
                document.getElementById('cam-icon').innerHTML = `<polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>`;
            } else { 
                btn.classList.add('disabled');
                document.getElementById('cam-icon').innerHTML = `<path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"></path><line x1="1" y1="1" x2="23" y2="23"></line>`;
            }
        }
    }
</script>
