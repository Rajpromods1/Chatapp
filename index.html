<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RAJ MODS | HATKE v17.0</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #ff4d4d; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        html, body { background: var(--bg); color: #fff; font-family: 'SF Pro Display', -apple-system, sans-serif; height: 100%; width: 100%; overflow: hidden; position: fixed; overscroll-behavior: none; }
        svg { display: block; } 

        /* --- LOBBY SCREEN --- */
        #lobby-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a0a0a 0%, #050505 100%); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .lobby-box { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08); text-align: center; width: 85%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .lobby-box h2 { color: var(--accent); letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .lobby-id-box { background: #111; border: 1px dashed #444; border-radius: 10px; padding: 12px; margin-bottom: 20px; font-size: 0.85rem; color: #aaa; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: var(--accent); color: #000; border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .copy-btn:active { transform: scale(0.9); }
        .lobby-input { width: 100%; padding: 14px; background: rgba(0,0,0,0.4); border: 2px solid #333; border-radius: 12px; color: #fff; font-size: 15px; outline: none; margin-bottom: 12px; text-align: center; }
        .lobby-input:focus { border-color: var(--accent); }
        .lobby-btn { width: 100%; padding: 16px; background: var(--accent); margin-top: 10px; border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; }

        /* --- CHAT INTERFACE --- */
        #chat-screen { display: none; height: 100%; width: 100%; flex-direction: column; position: absolute; top: 0; left: 0; }
        header { padding: 15px; border-bottom: 1px solid #1a1a1a; background: rgba(10,10,10,0.9); font-weight: bold; color: var(--accent); letter-spacing: 1.5px; flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .video-call-icon { cursor: pointer; display: none; padding: 8px; background: #222; border-radius: 50%; color: #fff; transition: 0.2s; }
        .video-call-icon:active { transform: scale(0.9); background: var(--accent); color: #000; }

        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: #08080a; user-select: none; -webkit-user-select: none; touch-action: pan-y; }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .call-log-msg { align-self: center; background: rgba(255,255,255,0.08); border: 1px solid #333; color: #ccc; font-size: 0.75rem; padding: 6px 12px; border-radius: 12px; margin: 5px 0; display: flex; align-items: center; gap: 5px; font-weight: bold; }
        .msg-con { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .msg-con.me { align-self: flex-end; align-items: flex-end; }
        .msg-con.peer { align-self: flex-start; align-items: flex-start; }
        .msg-bubble-wrapper { width: 100%; display: flex; position: relative; }
        .me .msg-bubble-wrapper { justify-content: flex-end; }
        .peer .msg-bubble-wrapper { justify-content: flex-start; }

        /* Bubble Styles */
        .msg-bubble { padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; word-wrap: break-word; position: relative; will-change: transform; transition: transform 0.2s ease-out; }
        .me .msg-bubble { background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .peer .msg-bubble { background: #1e1e22; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }
        
        /* Media Specific Bubbles */
        .msg-bubble.media-bubble { padding: 4px; background: transparent !important; border: none !important; }
        .media-bubble img, .media-bubble video { border-radius: 14px; max-width: 240px; display: block; object-fit: cover; max-height: 300px; }
        
        .msg-bubble.audio-bubble { padding: 0; background: transparent !important; border: none !important; }
        .audio-bubble audio { height: 45px; max-width: 220px; outline: none; border-radius: 30px; background: #e0e0e0; }
        .me .audio-bubble audio { background: var(--accent); }

        .quoted-msg { background: rgba(0,0,0,0.15); border-left: 3px solid #000; padding: 5px 8px; border-radius: 6px; margin-bottom: 5px; font-size: 0.8rem; opacity: 0.8; }
        .peer .quoted-msg { background: rgba(255,255,255,0.05); border-left-color: var(--accent); }
        .quoted-name { font-weight: bold; font-size: 0.75rem; margin-bottom: 2px; }

        .reaction-badge { position: absolute; bottom: -12px; font-size: 12px; background: #222; border: 1px solid #444; border-radius: 12px; padding: 2px 6px; display: none; z-index: 5; align-items: center; justify-content: center; gap: 2px; }
        .me .reaction-badge { left: 10px; }
        .peer .reaction-badge { right: 10px; }

        .msg-info { display: flex; gap: 5px; font-size: 10px; color: #666; margin-top: 3px; padding: 0 4px; align-items: center; }
        .tick { font-weight: bold; font-size: 12px; transition: color 0.3s ease; }
        .tick.delivered { color: #888; }
        .tick.seen { color: #00a8ff; }
        .edited-tag { font-style: italic; font-size: 9px; opacity: 0.7; }
        
        #typing-indicator { display: none; align-self: flex-start; color: #888; font-size: 0.8rem; font-style: italic; padding: 0 20px; margin-bottom: 10px; }
        .dots span { animation: blink 1.4s infinite both; font-weight: bold; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Controls Area */
        .controls-area { background: #0c0c0c; border-top: 1px solid #1a1a1a; padding: 10px 10px calc(10px + env(safe-area-inset-bottom)) 10px; width: 100%; flex-shrink: 0; display: flex; gap: 10px; z-index: 10; align-items: center; }
        .attach-btn { background: #222; color: #fff; border: 1px solid #333; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0; }
        .attach-btn:active { transform: scale(0.9); }
        .msg-input { flex: 1; background: #222; border: 1px solid #333; padding: 14px; color: #fff; border-radius: 24px; outline: none; font-size: 16px; }
        
        .send-btn, .mic-btn { background: var(--accent); color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; flex-shrink: 0; user-select: none; -webkit-user-select: none; }
        .send-btn:active { transform: scale(0.9); }
        .mic-btn.recording { background: #ff4d4d; animation: pulse 1s infinite; transform: scale(1.1); }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 77, 77, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 77, 77, 0); } }

        #reply-preview-box { display: none; background: #1a1a1a; border-left: 3px solid var(--accent); padding: 10px; font-size: 0.8rem; color: #ccc; border-radius: 8px 8px 0 0; position: relative; justify-content: space-between; align-items: center; }
        .close-reply { cursor: pointer; font-size: 16px; color: #888; padding: 0 10px; }

        /* --- WHATSAPP STYLE COMBINED ACTION MENU --- */
        #action-menu-overlay { display: none; position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%); background: rgba(20,20,20,0.95); backdrop-filter: blur(10px); padding: 15px; border-radius: 20px; border: 1px solid #333; z-index: 2000; box-shadow: 0 5px 20px rgba(0,0,0,0.8); width: 90%; max-width: 320px; flex-direction: column; animation: popUp 0.2s ease-out; }
        @keyframes popUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        .emoji-row { display: flex; justify-content: space-between; background: #222; padding: 12px; border-radius: 15px; margin-bottom: 15px; border: 1px solid #444;}
        .emoji-btn { font-size: 26px; cursor: pointer; transition: 0.2s; user-select: none; }
        .emoji-btn:active { transform: scale(1.3); }
        
        .action-btn-row { display: flex; flex-direction: column; gap: 10px; }
        .act-btn { padding: 12px; background: #222; color: #fff; border: 1px solid #444; border-radius: 10px; font-size: 16px; cursor: pointer; font-weight: bold; text-align: left; padding-left: 20px;}
        .act-btn.delete { color: var(--accent); border-color: rgba(255,77,77,0.3); }

        #dim-bg { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: transparent; z-index: 1999; }

        /* Custom Alert */
        #custom-alert-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 9999; justify-content: center; align-items: center; }
        .custom-alert-box { background: #111; border: 1px solid var(--accent); padding: 25px; border-radius: 16px; width: 85%; max-width: 320px; text-align: center; }
        .custom-alert-box h3 { color: var(--accent); margin-bottom: 12px; font-size: 1.1rem; text-transform: uppercase; }
        .custom-alert-box p { color: #ddd; font-size: 14px; margin-bottom: 22px; }
        .custom-alert-btn { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; }

        /* Video Call */
        #video-call-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; flex-direction:column; }
        #remote-video { width:100%; height:100%; object-fit:cover; background:#050505; }
        #local-video { position:absolute; top:env(safe-area-inset-top, 40px); right:20px; width:100px; height:150px; object-fit:cover; border-radius:12px; border:2px solid #333; background:#111; box-shadow: 0 5px 15px rgba(0,0,0,0.5); z-index:3001; }
        .call-action-bar { position:absolute; bottom:calc(40px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); display:flex; gap:20px; background:rgba(20,20,20,0.8); padding:15px 25px; border-radius:30px; backdrop-filter:blur(10px); z-index:3002; border:1px solid rgba(255,255,255,0.1); }
        .call-btn { width:55px; height:55px; border-radius:50%; border:none; cursor:pointer; display:flex; justify-content:center; align-items:center; background:#333; color:#fff; transition: 0.2s; }
        .call-btn:active { transform: scale(0.9); }
        .call-btn.disabled { background: #ff4d4d; color: #000; }
        .call-btn.end { background:#ff4d4d; color:#000; }
        
        #incoming-call-modal { display:none; position:fixed; top:50px; left:50%; transform:translateX(-50%); background:rgba(20,20,20,0.95); border:1px solid #333; padding:20px; border-radius:15px; z-index:4000; text-align:center; width:90%; max-width:300px; }
        .inc-btn { flex:1; padding:12px; border:none; border-radius:8px; font-weight:bold; cursor:pointer; margin:5px; display:flex; align-items:center; justify-content:center; gap:8px;}
        .inc-btn.accept { background:#00d26a; color:#000;} .inc-btn.reject { background:#ff4d4d; color:#000;}
    </style>
</head>
<body>

<div id="custom-alert-overlay"><div class="custom-alert-box"><h3 id="custom-alert-title">Notice</h3><p id="custom-alert-text"></p><button class="custom-alert-btn" onclick="closeCustomAlert()">OK</button></div></div>

<div id="lobby-screen">
    <div class="lobby-box">
        <h2>RAJ MODS</h2>
        <p style="color:#666; font-size: 11px; margin-bottom: 15px;">HATKE APP v17.0 | WHATSAPP CLONE</p>
        <div class="lobby-id-box"><span id="my-lobby-id">Generating Key...</span><button type="button" class="copy-btn" id="copy-action-btn" onclick="copyMyID()">COPY KEY</button></div>
        <input type="text" id="username-input" class="lobby-input" placeholder="Your Name" maxlength="12">
        <input type="text" id="target-id" class="lobby-input" placeholder="Partner's Key (Paste here)">
        <button type="button" onclick="startChat()" class="lobby-btn">START SECURE CHAT</button>
    </div>
</div>

<div id="chat-screen">
    <header>
        <span id="chat-header">HATKE SECURE (1)</span>
        <div class="video-call-icon" id="start-video-btn" onclick="initiateCall()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        </div>
    </header>

    <div id="chat-box"></div>
    <div id="typing-indicator"><span id="typer-name">Someone</span> is typing<span class="dots"><span>.</span><span>.</span><span>.</span></span></div>

    <div id="reply-preview-box">
        <div>
            <div style="font-weight:bold; font-size:10px; color:var(--accent); margin-bottom:3px;" id="reply-preview-name">Name</div>
            <div id="reply-preview-text" style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width:250px;">Message text</div>
        </div>
        <div class="close-reply" onclick="cancelReply()">✖</div>
    </div>

    <div class="controls-area">
        <input type="file" id="file-input" accept="image/*,video/*,audio/*" style="display:none;" onchange="handleFileUpload(event)">
        <button class="attach-btn" onclick="document.getElementById('file-input').click()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>

        <input type="text" id="msg-input" class="msg-input" placeholder="Message..." autocomplete="off">
        
        <button type="button" id="send-btn" class="send-btn" style="display:none;">
            <svg id="send-icon" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>

        <button type="button" id="mic-btn" class="mic-btn">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
    </div>
</div>

<div id="dim-bg" onclick="closePopups()"></div>

<div id="action-menu-overlay">
    <div class="emoji-row">
        <span class="emoji-btn" onclick="sendReaction('❤️')">❤️</span>
        <span class="emoji-btn" onclick="sendReaction('😂')">😂</span>
        <span class="emoji-btn" onclick="sendReaction('😮')">😮</span>
        <span class="emoji-btn" onclick="sendReaction('😢')">😢</span>
        <span class="emoji-btn" onclick="sendReaction('🙏')">🙏</span>
        <span class="emoji-btn" onclick="sendReaction('👍')">👍</span>
    </div>
    <div class="action-btn-row" id="action-btn-container"></div>
</div>

<div id="video-call-screen">
    <video id="remote-video" autoplay playsinline></video>
    <video id="local-video" autoplay playsinline muted></video>
    <div class="call-action-bar">
        <button class="call-btn" id="mute-btn" onclick="toggleAudio()">
            <svg id="mic-icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
        </button>
        <button class="call-btn" id="cam-btn" onclick="toggleVideo()">
            <svg id="cam-icon-svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        </button>
        <button class="call-btn end" onclick="endCall()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="23" y1="1" x2="1" y2="23"></line></svg>
        </button>
    </div>
</div>

<div id="incoming-call-modal">
    <h3 style="margin-bottom:10px; color:#fff;">Incoming Video Call</h3>
    <p id="caller-name" style="font-size:13px; color:#aaa; margin-bottom:15px;">Partner is calling...</p>
    <div class="incoming-btns">
        <button class="inc-btn accept" onclick="acceptCall()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            Accept
        </button>
        <button class="inc-btn reject" onclick="rejectCall()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.68 13.31a16 16 0 0 0 3.41 2.6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7 2 2 0 0 1 1.72 2v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.42 19.42 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91"></path><line x1="23" y1="1" x2="1" y2="23"></line></svg>
            Reject
        </button>
    </div>
</div>

<script>
    // --- UI HELPERS ---
    function showCustomAlert(title, message) { document.getElementById('custom-alert-title').innerText = title; document.getElementById('custom-alert-text').innerText = message; document.getElementById('custom-alert-overlay').style.display = 'flex'; }
    function closeCustomAlert() { document.getElementById('custom-alert-overlay').style.display = 'none'; }
    if (window.visualViewport) window.visualViewport.addEventListener('resize', () => { document.body.style.height = window.visualViewport.height + 'px'; const chatBox = document.getElementById('chat-box'); chatBox.scrollTop = chatBox.scrollHeight; });

    let peer, myUsername, activeConnections = {}, peerIdToName = {};
    let unreadMessages = [], msgReactions = {};
    let localStream = null, currentCall = null, pendingIncomingCall = null;
    let activeReplyId = null, editingMsgId = null, selectedMsgIdForAction = null;

    peer = new Peer({ config: {'iceServers': [{ url: 'stun:stun.l.google.com:19302' }]} });
    peer.on('open', id => { document.getElementById('my-lobby-id').innerHTML = `<b style="color:#fff;" id="raw-id">${id}</b>`; });
    peer.on('connection', (conn) => { setupConnection(conn); });
    peer.on('call', (call) => { pendingIncomingCall = call; document.getElementById('caller-name').innerText = `Partner is calling...`; document.getElementById('incoming-call-modal').style.display = 'block'; });

    // --- NOTIFICATIONS ---
    function requestNotificationPermission() { if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") Notification.requestPermission(); }
    function playNotificationSound() { try { const audio = new Audio('https://actions.google.com/sounds/v1/water/water_drop.ogg'); audio.play().catch(e => console.log("Sound blocked")); } catch (e) {} }
    function showPushNotification(sender, messageText) {
        if ("Notification" in window && Notification.permission === "granted") {
            if (document.visibilityState === 'hidden') {
                const text = messageText.includes("data:image") ? "📷 Image" : (messageText.includes("data:video") ? "🎥 Video" : (messageText.includes("data:audio") ? "🎤 Voice Message" : messageText));
                const notification = new Notification(`New message from ${sender}`, { body: text });
                notification.onclick = function() { window.focus(); this.close(); };
            }
        }
    }

    // --- COPY ID ---
    function copyMyID() {
        const idText = document.getElementById('raw-id').innerText;
        if (navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(idText).then(showCopySuccess).catch(() => fallbackCopy(idText));
        else fallbackCopy(idText);
    }
    function fallbackCopy(t) { const el = document.createElement("textarea"); el.value = t; document.body.appendChild(el); el.select(); try { document.execCommand('copy'); showCopySuccess(); } catch (e) { showCustomAlert("Copy Failed", "Manual Copy: " + t); } document.body.removeChild(el); }
    function showCopySuccess() { const btn = document.getElementById('copy-action-btn'); btn.innerText = "COPIED!"; btn.style.background = "#fff"; setTimeout(() => { btn.innerText = "COPY KEY"; btn.style.background = "var(--accent)"; }, 1500); }

    // --- START CHAT ---
    function startChat() {
        const name = document.getElementById('username-input').value.trim();
        if(!name) return showCustomAlert("Name Required", "Bhai, enter your name before starting!");
        
        requestNotificationPermission();
        myUsername = name.toUpperCase(); const targetId = document.getElementById('target-id').value.trim();
        document.getElementById('lobby-screen').style.display = 'none'; document.getElementById('chat-screen').style.display = 'flex';
        
        if(targetId && targetId !== peer.id) setupConnection(peer.connect(targetId));
    }

    // --- CONNECTION LOGIC ---
    function setupConnection(conn) {
        conn.on('open', () => { 
            activeConnections[conn.peer] = conn; conn.send({type: 'HANDSHAKE', name: myUsername}); 
            const otherPeers = Object.keys(activeConnections).filter(id => id !== conn.peer);
            if(otherPeers.length > 0) conn.send({type: 'PEER_LIST', peers: otherPeers});
            updateCount(); 
        });
        conn.on('data', (data) => {
            if(data.type === 'GHOST_CHAT') {
                hideTyping(); 
                
                // MEDIA TYPE FALLBACK FIX
                let rType = data.msgType || 'text';
                if(typeof data.data === 'string') {
                    if(data.data.startsWith('data:image')) rType = 'image';
                    if(data.data.startsWith('data:video')) rType = 'video';
                    if(data.data.startsWith('data:audio')) rType = 'audio';
                }

                addMsg(data.name, data.data, 'peer', data.msgId, data.replyObj, rType);
                conn.send({type: 'DELIVERED', msgId: data.msgId});
                playNotificationSound(); showPushNotification(data.name, data.data);
                if (document.visibilityState === 'visible') conn.send({type: 'READ', msgId: data.msgId}); else unreadMessages.push(data.msgId); 
            } 
            else if(data.type === 'HANDSHAKE') { peerIdToName[conn.peer] = data.name; updateCount(); }
            else if(data.type === 'PEER_LIST') { data.peers.forEach(pid => { if(!activeConnections[pid] && pid !== peer.id) setupConnection(peer.connect(pid)); }); }
            else if(data.type === 'TYPING') { data.isTyping ? showTyping(data.name) : hideTyping(); }
            else if(data.type === 'DELIVERED') { markAsDelivered(data.msgId); }
            else if(data.type === 'READ') { markAsRead(data.msgId); }
            else if(data.type === 'REACTION') { updateReactionUI(data.msgId, data.name, data.emoji); }
            else if(data.type === 'EDIT') { updateBubbleText(data.msgId, data.text); }
            else if(data.type === 'DELETE') { removeBubbleText(data.msgId); }
            else if(data.type === 'CALL_LOG') { appendCallLogMsg(data.status); } 
        });
        conn.on('close', () => { delete activeConnections[conn.peer]; updateCount(); hideTyping(); cleanupCallUI(); });
    }

    // --- READ RECEIPTS ---
    document.addEventListener("visibilitychange", () => { if (document.visibilityState === 'visible' && unreadMessages.length > 0) sendReadReceipts(); });
    document.getElementById('msg-input').addEventListener('focus', () => { if(unreadMessages.length > 0) sendReadReceipts(); });
    function sendReadReceipts() { Object.values(activeConnections).forEach(c => unreadMessages.forEach(id => c.send({type: 'READ', msgId: id}))); unreadMessages = []; }

    // --- INPUT / SEND CHAT ---
    const msgInput = document.getElementById('msg-input'); 
    const sendBtn = document.getElementById('send-btn');
    const micBtn = document.getElementById('mic-btn');
    let typingTimer;

    msgInput.addEventListener('input', () => {
        if(msgInput.value.trim().length > 0) { micBtn.style.display = 'none'; sendBtn.style.display = 'flex'; } 
        else { micBtn.style.display = 'flex'; sendBtn.style.display = 'none'; }
        if(Object.keys(activeConnections).length === 0) return;
        Object.values(activeConnections).forEach(c => c.send({type: 'TYPING', isTyping: true, name: myUsername}));
        clearTimeout(typingTimer); typingTimer = setTimeout(() => { Object.values(activeConnections).forEach(c => c.send({type: 'TYPING', isTyping: false, name: myUsername})); }, 1500);
    });

    sendBtn.onclick = () => sendChat('text', msgInput.value.trim());
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendChat('text', msgInput.value.trim()); };

    function sendChat(msgType, dataContent) {
        if(!dataContent) return;
        
        if (editingMsgId && msgType === 'text') {
            updateBubbleText(editingMsgId, dataContent);
            Object.values(activeConnections).forEach(c => c.send({type: 'EDIT', msgId: editingMsgId, text: dataContent}));
            cancelEdit(); return;
        }

        const messageId = "msg_" + Date.now(); 
        let replyObj = null;
        if(activeReplyId) replyObj = { sender: document.getElementById('reply-preview-name').innerText, text: document.getElementById('reply-preview-text').innerText };

        Object.values(activeConnections).forEach(c => {
            c.send({type: 'TYPING', isTyping: false, name: myUsername});
            c.send({type: 'GHOST_CHAT', name: myUsername, data: dataContent, msgId: messageId, replyObj: replyObj, msgType: msgType});
        });
        
        addMsg(myUsername, dataContent, 'me', messageId, replyObj, msgType); 
        msgInput.value = ""; cancelReply();
        micBtn.style.display = 'flex'; sendBtn.style.display = 'none'; 
    }

    // --- MEDIA UPLOAD ---
    function handleFileUpload(event) {
        const file = event.target.files[0]; if(!file) return;
        if(file.size > 5 * 1024 * 1024) return showCustomAlert("File Too Large", "Bhai, please select a file smaller than 5MB.");
        const reader = new FileReader();
        reader.onload = function(e) {
            const base64Data = e.target.result;
            const type = file.type.startsWith('video') ? 'video' : 'image';
            sendChat(type, base64Data);
        };
        reader.readAsDataURL(file); event.target.value = ""; 
    }

    // --- VOICE MESSAGE RECORDING ---
    let mediaRecorder;
    let audioChunks = [];
    let isRecording = false;

    async function startRecording(e) {
        if(e.type === 'touchstart' || e.type === 'mousedown') {
            // Only prevent default on the element so scrolling the chat still works
            e.stopPropagation(); 
        }
        if(isRecording) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            audioChunks = [];
            mediaRecorder.ondataavailable = ev => { if(ev.data.size > 0) audioChunks.push(ev.data); };
            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = function(ev) { sendChat('audio', ev.target.result); };
                reader.readAsDataURL(audioBlob);
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            isRecording = true;
            micBtn.classList.add('recording');
        } catch (err) { showCustomAlert("Mic Error", "Permission denied for Microphone."); }
    }

    function stopRecording(e) {
        if(!isRecording) return;
        if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
        isRecording = false;
        micBtn.classList.remove('recording');
    }

    micBtn.addEventListener('touchstart', startRecording, {passive: false});
    micBtn.addEventListener('mousedown', startRecording);
    window.addEventListener('touchend', stopRecording);
    window.addEventListener('mouseup', stopRecording);

    // --- DOM MESSAGE RENDER ---
    function addMsg(sender, data, type, msgId, replyObj = null, msgType = 'text') {
        const box = document.getElementById('chat-box'); const div = document.createElement('div');
        div.className = `msg-con ${type}`; div.id = `con-${msgId}`;
        
        let replyHTML = ''; if(replyObj) replyHTML = `<div class="quoted-msg"><div class="quoted-name">${replyObj.sender}</div><div style="white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px;">${replyObj.text}</div></div>`;

        let contentHTML = ''; let extraClass = '';
        if (msgType === 'image') { contentHTML = `<img src="${data}" onclick="openFullscreen(this.src)">`; extraClass = 'media-bubble'; } 
        else if (msgType === 'video') { contentHTML = `<video src="${data}" controls></video>`; extraClass = 'media-bubble'; } 
        else if (msgType === 'audio') { contentHTML = `<audio src="${data}" controls></audio>`; extraClass = 'audio-bubble';} 
        else { contentHTML = `<span class="bubble-text">${data}</span>`; }

        const safeText = msgType === 'text' ? data : (msgType === 'audio' ? '🎤 Voice Message' : '📷 Media');

        div.innerHTML = `
            <div class="msg-bubble-wrapper">
                <div class="msg-bubble ${extraClass}" id="bubble-${msgId}" data-raw-text="${encodeURIComponent(safeText)}">
                    ${replyHTML} ${contentHTML}
                    <div class="reaction-badge" id="react-${msgId}"></div>
                </div>
            </div>
            <div class="msg-info">
                <span>${sender}</span> <span class="edited-tag" id="edit-tag-${msgId}"></span>
                ${type === 'me' ? `<span class="tick" id="tick-${msgId}">✓</span>` : ''}
            </div>`;
        box.appendChild(div); box.scrollTop = box.scrollHeight;
    }

    function appendCallLogMsg(status) {
        const box = document.getElementById('chat-box');
        let text = status === 'missed' ? "📞 Missed video call" : "📞 Video call ended";
        box.insertAdjacentHTML('beforeend', `<div class="call-log-msg">${text}</div>`);
        box.scrollTop = box.scrollHeight;
    }

    function openFullscreen(src) {
        const w = window.open("");
        w.document.write(`<body style="margin:0;background:#000;display:flex;justify-content:center;align-items:center;"><img src="${src}" style="max-width:100%;max-height:100vh;"></body>`);
    }

    // --- TOUCH, SWIPE & LONG PRESS (COMBINED MENU) ---
    const chatBox = document.getElementById('chat-box');
    let tStartX = 0, tStartY = 0, currentX = 0;
    let activeBubble = null, isSwiping = false, pressTimer;

    chatBox.addEventListener('touchstart', (e) => {
        const bubble = e.target.closest('.msg-bubble'); if(!bubble) return;
        if(e.target.tagName === 'AUDIO' || e.target.tagName === 'VIDEO') return;

        activeBubble = bubble; touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; currentX = touchStartX;
        isSwiping = false; activeBubble.style.transition = 'none';
        
        // 500ms LONG PRESS triggers Combined Action Menu
        pressTimer = setTimeout(() => { openMessageActions(bubble.closest('.msg-con').id); }, 500); 
    }, {passive: true});

    chatBox.addEventListener('touchmove', (e) => {
        if(!activeBubble) return;
        currentX = e.touches[0].clientX; const diffX = currentX - touchStartX; const diffY = Math.abs(e.touches[0].clientY - touchStartY);

        if(diffX > 15 && diffX > diffY) {
            isSwiping = true; clearTimeout(pressTimer);
            let moveX = Math.min(diffX, 60); 
            activeBubble.style.transform = `translateX(${moveX}px)`;
        } else if (diffY > 15) { clearTimeout(pressTimer); } 
    }, {passive: true});

    chatBox.addEventListener('touchend', (e) => {
        clearTimeout(pressTimer); if(!activeBubble) return;
        
        const diffX = currentX - touchStartX; const msgId = activeBubble.closest('.msg-con').id.replace('con-', '');

        // Swiped far enough
        if(isSwiping && diffX > 40) {
            initiateReply(msgId, activeBubble);
        }

        activeBubble.style.transition = 'transform 0.3s ease'; activeBubble.style.transform = 'translateX(0)';
        setTimeout(() => { if(activeBubble) activeBubble.style.transition = 'none'; activeBubble = null; }, 300);
    });
    chatBox.addEventListener('touchcancel', () => { clearTimeout(pressTimer); if(activeBubble) { activeBubble.style.transform = 'translateX(0)'; activeBubble = null; } });

    // --- REPLIES ---
    function initiateReply(msgId, bubbleEl) {
        activeReplyId = msgId;
        const sender = bubbleEl.closest('.msg-con').querySelector('.msg-info span').innerText;
        let text = decodeURIComponent(bubbleEl.getAttribute('data-raw-text'));
        if(text === "🚫 This message was deleted") return; 
        document.getElementById('reply-preview-name').innerText = sender; document.getElementById('reply-preview-text').innerText = text;
        document.getElementById('reply-preview-box').style.display = 'flex'; document.getElementById('msg-input').focus();
    }
    function cancelReply() { activeReplyId = null; document.getElementById('reply-preview-box').style.display = 'none'; }

    // --- COMBINED ACTION MENU (Reactions + Edit/Delete) ---
    function openMessageActions(fullConId) {
        selectedMsgIdForAction = fullConId.replace('con-', '');
        const isMe = document.getElementById(fullConId).classList.contains('me');
        const bubble = document.getElementById(`bubble-${selectedMsgIdForAction}`);
        let text = decodeURIComponent(bubble.getAttribute('data-raw-text'));
        if(text === "🚫 This message was deleted") return; 
        
        const menuContainer = document.getElementById('action-btn-container');
        let editBtn = text !== '📷 Media' && text !== '🎤 Voice Message' ? `<button class="act-btn" onclick="triggerAction('edit')">✏️ Edit Message</button>` : '';

        if(isMe) {
            menuContainer.innerHTML = `
                <button class="act-btn" onclick="triggerAction('reply')">↩️ Reply</button>
                ${editBtn}
                <button class="act-btn delete" onclick="triggerAction('delete')">🗑️ Delete for Everyone</button>`;
        } else {
            menuContainer.innerHTML = `<button class="act-btn" onclick="triggerAction('reply')">↩️ Reply</button>`;
        }
        document.getElementById('action-menu-overlay').style.display = 'flex'; document.getElementById('dim-bg').style.display = 'block';
    }

    function triggerAction(action) {
        closePopups(); if(!selectedMsgIdForAction) return;
        const bubble = document.getElementById(`bubble-${selectedMsgIdForAction}`);
        const rawText = decodeURIComponent(bubble.getAttribute('data-raw-text'));

        if (action === 'reply') {
            initiateReply(selectedMsgIdForAction, bubble);
        } else if (action === 'edit') {
            editingMsgId = selectedMsgIdForAction;
            const input = document.getElementById('msg-input'); input.value = rawText; input.focus();
            document.getElementById('send-icon').innerHTML = `<polyline points="20 6 9 17 4 12"></polyline>`;
            document.getElementById('send-btn').style.display = 'flex'; document.getElementById('mic-btn').style.display = 'none';
        } else if (action === 'delete') {
            removeBubbleText(selectedMsgIdForAction);
            Object.values(activeConnections).forEach(c => c.send({type: 'DELETE', msgId: selectedMsgIdForAction}));
        }
    }

    function cancelEdit() { editingMsgId = null; document.getElementById('send-icon').innerHTML = `<line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>`; }
    function updateBubbleText(msgId, newText) {
        const bubble = document.getElementById(`bubble-${msgId}`);
        if(bubble) {
            bubble.setAttribute('data-raw-text', encodeURIComponent(newText));
            const textSpan = bubble.querySelector('.bubble-text'); if(textSpan) textSpan.innerText = newText;
            document.getElementById(`edit-tag-${msgId}`).innerText = "(edited)";
        }
    }
    function removeBubbleText(msgId) {
        const bubble = document.getElementById(`bubble-${msgId}`);
        if(bubble) {
            bubble.innerHTML = `<span class="bubble-text" style="font-style:italic; color:#777;">🚫 This message was deleted</span>`;
            document.getElementById(`edit-tag-${msgId}`).innerText = "";
            bubble.setAttribute('data-raw-text', encodeURIComponent("🚫 This message was deleted"));
            bubble.classList.remove("media-bubble"); 
            bubble.classList.remove("audio-bubble");
        }
    }

    // --- REACTIONS ---
    function closePopups() { document.getElementById('action-menu-overlay').style.display = 'none'; document.getElementById('dim-bg').style.display = 'none'; selectedMsgIdForAction = null; }
    function sendReaction(emoji) {
        if(!selectedMsgIdForAction) return; updateReactionUI(selectedMsgIdForAction, myUsername, emoji);
        Object.values(activeConnections).forEach(c => c.send({type: 'REACTION', msgId: selectedMsgIdForAction, emoji: emoji, name: myUsername})); closePopups();
    }
    function updateReactionUI(msgId, userName, emoji) {
        if (!msgReactions[msgId]) msgReactions[msgId] = {};
        if (msgReactions[msgId][userName] === emoji) delete msgReactions[msgId][userName]; else msgReactions[msgId][userName] = emoji;
        renderReactions(msgId);
    }
    function renderReactions(msgId) {
        const badge = document.getElementById(`react-${msgId}`); if (!badge) return;
        const reactions = msgReactions[msgId] || {}; const usersReacted = Object.keys(reactions);
        if (usersReacted.length > 0) {
            let emojiCounts = {}; usersReacted.forEach(user => { let e = reactions[user]; emojiCounts[e] = (emojiCounts[e] || 0) + 1; });
            let displayStr = Object.keys(emojiCounts).join('');
            if (usersReacted.length > 1) displayStr += `<span style="font-size:9px; margin-left:3px; color:#aaa; font-weight:bold;">${usersReacted.length}</span>`;
            badge.innerHTML = displayStr; badge.style.display = 'flex';
        } else badge.style.display = 'none';
    }

    // --- TICK & TYPING LOGIC ---
    function markAsDelivered(msgId) { const tick = document.getElementById(`tick-${msgId}`); if(tick && tick.innerText === "✓") { tick.innerText = "✓✓"; tick.classList.add('delivered'); } }
    function markAsRead(msgId) { const tick = document.getElementById(`tick-${msgId}`); if(tick) { tick.innerText = "✓✓"; tick.classList.add('seen'); } }
    function showTyping(name) { document.getElementById('typer-name').innerText = name; document.getElementById('typing-indicator').style.display = 'block'; document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight; }
    function hideTyping() { document.getElementById('typing-indicator').style.display = 'none'; }
    function updateCount() { 
        const count = Object.keys(activeConnections).length; 
        document.getElementById('chat-header').innerHTML = `HATKE SECURE (${count + 1})`;
        document.getElementById('start-video-btn').style.display = count > 0 ? 'block' : 'none'; 
    }

    // --- VIDEO CALL LOGIC ---
    async function getMediaStream() { try { return await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true }); } catch (err) { showCustomAlert("Camera Error", "HTTPS required, or Camera blocked."); return null; } }
    async function initiateCall() { const peerId = Object.keys(activeConnections)[0]; if(!peerId) return; localStream = await getMediaStream(); if(!localStream) return; document.getElementById('local-video').srcObject = localStream; document.getElementById('video-call-screen').style.display = 'flex'; currentCall = peer.call(peerId, localStream); setupCallEvents(currentCall); }
    async function acceptCall() { document.getElementById('incoming-call-modal').style.display = 'none'; localStream = await getMediaStream(); if(!localStream) { pendingIncomingCall.close(); return; } document.getElementById('local-video').srcObject = localStream; document.getElementById('video-call-screen').style.display = 'flex'; currentCall = pendingIncomingCall; currentCall.answer(localStream); setupCallEvents(currentCall); }
    function rejectCall() { document.getElementById('incoming-call-modal').style.display = 'none'; if(pendingIncomingCall) pendingIncomingCall.close(); Object.values(activeConnections).forEach(c => c.send({type: 'CALL_LOG', status: 'missed'})); appendCallLogMsg('missed'); }
    function setupCallEvents(call) { call.on('stream', (remoteStream) => { const rVid = document.getElementById('remote-video'); if (rVid.srcObject !== remoteStream) { rVid.srcObject = remoteStream; rVid.play().catch(e=>console.error(e)); } }); call.on('close', cleanupCallUI); }
    function endCall() { if(currentCall) currentCall.close(); Object.values(activeConnections).forEach(c => c.send({type: 'CALL_LOG', status: 'ended'})); appendCallLogMsg('ended'); cleanupCallUI(); }
    function cleanupCallUI() { document.getElementById('video-call-screen').style.display = 'none'; document.getElementById('incoming-call-modal').style.display = 'none'; if(localStream) { localStream.getTracks().forEach(track => track.stop()); localStream = null; } currentCall = null; pendingIncomingCall = null; document.getElementById('remote-video').srcObject = null; document.getElementById('local-video').srcObject = null; }
    function toggleAudio() { if(localStream) { const audioTrack = localStream.getAudioTracks()[0]; audioTrack.enabled = !audioTrack.enabled; const btn = document.getElementById('mute-btn'); if(audioTrack.enabled) { btn.classList.remove('disabled'); document.getElementById('mic-icon-svg').innerHTML = `<path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line>`; } else { btn.classList.add('disabled'); document.getElementById('mic-icon-svg').innerHTML = `<line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line>`; } } }
    function toggleVideo() { if(localStream) { const videoTrack = localStream.getVideoTracks()[0]; videoTrack.enabled = !videoTrack.enabled; const btn = document.getElementById('cam-btn'); if(videoTrack.enabled) { btn.classList.remove('disabled'); document.getElementById('cam-icon-svg').innerHTML = `<polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>`; } else { btn.classList.add('disabled'); document.getElementById('cam-icon-svg').innerHTML = `<path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"></path><line x1="1" y1="1" x2="23" y2="23"></line>`; } } }
</script>
