<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RAJ MODS | GHOST HUB v5.1</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --accent: #ff4d4d; --bg: #050505; --glass: rgba(255, 255, 255, 0.05); }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        html, body { 
            background: var(--bg); color: #fff; font-family: 'SF Pro Display', sans-serif; 
            height: 100%; width: 100%; overflow: hidden; position: fixed; 
        }

        /* --- 1. LOBBY SCREEN (All Settings Here) --- */
        #lobby-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a0a0a 0%, #050505 100%);
            display: flex; justify-content: center; align-items: center; z-index: 2000;
        }
        .lobby-box {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.08);
            text-align: center; width: 85%; max-width: 380px; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .lobby-box h2 { color: var(--accent); letter-spacing: 3px; margin-bottom: 5px; }
        
        .lobby-id-box {
            background: #111; border: 1px dashed #444; border-radius: 10px;
            padding: 12px; margin-bottom: 20px; font-size: 0.85rem; color: #aaa;
            display: flex; justify-content: space-between; align-items: center;
        }
        .copy-btn { background: var(--accent); color: #000; border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .copy-btn:active { transform: scale(0.9); }

        .lobby-input { 
            width: 100%; padding: 14px; background: rgba(0,0,0,0.4); 
            border: 2px solid #333; border-radius: 12px; color: #fff; 
            font-size: 15px; outline: none; margin-bottom: 12px; text-align: center;
        }
        .lobby-input:focus { border-color: var(--accent); }
        
        .lobby-btn { 
            width: 100%; padding: 16px; background: var(--accent); margin-top: 10px;
            border: none; border-radius: 12px; color: #000; 
            font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem;
        }

        /* --- 2. MAIN CHAT INTERFACE (Clean) --- */
        #chat-screen { 
            display: none; height: 100%; width: 100%;
            flex-direction: column; position: absolute; top: 0; left: 0;
        }
        
        header { 
            padding: 15px; text-align: center; border-bottom: 1px solid #1a1a1a;
            background: rgba(10,10,10,0.9); font-weight: bold; color: var(--accent);
            letter-spacing: 1.5px; flex-shrink: 0;
        }

        #chat-box { 
            flex: 1; overflow-y: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 15px;
            background: #08080a;
        }

        .msg-con { display: flex; flex-direction: column; max-width: 80%; }
        .msg-con.me { align-self: flex-end; align-items: flex-end; }
        .msg-con.peer { align-self: flex-start; align-items: flex-start; }
        .msg-bubble { padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; word-wrap: break-word; }
        .me .msg-bubble { background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .peer .msg-bubble { background: #1e1e22; color: #fff; border-bottom-left-radius: 2px; border: 1px solid #333; }
        .sys-msg { align-self: center; font-size: 0.7rem; color: #777; text-align: center; margin: 5px 0; }

        /* Typing Animation */
        #typing-indicator {
            display: none; align-self: flex-start; background: transparent; 
            color: #888; font-size: 0.8rem; font-style: italic; padding: 0 20px; margin-bottom: 10px;
        }
        .dots span { animation: blink 1.4s infinite both; font-weight: bold; }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }

        /* Controls */
        .controls-area { 
            background: #0c0c0c; border-top: 1px solid #1a1a1a; 
            padding: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
            width: 100%; flex-shrink: 0; display: flex; gap: 10px;
        }
        .msg-input { 
            flex: 1; background: #222; border: 1px solid #333; padding: 14px; 
            color: #fff; border-radius: 12px; outline: none; font-size: 16px; 
        }
        .send-btn { background: var(--accent); color: #000; border: none; padding: 0 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

    </style>
</head>
<body>

<div id="lobby-screen">
    <div class="lobby-box">
        <h2>RAJ MODS</h2>
        <p style="color:#666; font-size: 11px; margin-bottom: 15px;">GHOST HUB v5.1</p>
        
        <div class="lobby-id-box">
            <span id="my-lobby-id">Generating ID...</span>
            <button type="button" class="copy-btn" id="copy-action-btn" onclick="copyMyID()">COPY</button>
        </div>

        <input type="text" id="username-input" class="lobby-input" placeholder="Your Username" maxlength="12">
        <input type="text" id="target-id" class="lobby-input" placeholder="Friend's Ghost ID (Paste here)">
        
        <button type="button" onclick="startChat()" class="lobby-btn">INITIALIZE SESSION</button>
    </div>
</div>

<div id="chat-screen">
    <header id="chat-header">GHOST HUB (1/5)</header>

    <div id="chat-box">
        <div class="sys-msg">Encrypted tunnel established.</div>
    </div>
    
    <div id="typing-indicator">
        <span id="typer-name">Someone</span> is typing<span class="dots"><span>.</span><span>.</span><span>.</span></span>
    </div>

    <div class="controls-area">
        <input type="text" id="msg-input" class="msg-input" placeholder="Write a message..." autocomplete="off">
        <button type="button" id="send-btn" class="send-btn">SEND</button>
    </div>
</div>

<script>
    // Visual Viewport Fix
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            document.body.style.height = window.visualViewport.height + 'px';
            const chatBox = document.getElementById('chat-box');
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    }

    let peer, myUsername, activeConnections = {}, peerIdToName = {};

    // 1. Peer Initialization
    peer = new Peer();
    peer.on('open', id => {
        document.getElementById('my-lobby-id').innerHTML = `<b style="color:#fff;" id="raw-id">${id}</b>`;
    });
    peer.on('connection', setupConnection);

    // 2. FIXED COPY FUNCTION (With Fallback)
    function copyMyID() {
        const idElement = document.getElementById('raw-id');
        if(!idElement) return;
        const idText = idElement.innerText;

        // Try modern API
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(idText).then(() => {
                showCopySuccess();
            }).catch(() => {
                fallbackCopy(idText);
            });
        } else {
            fallbackCopy(idText);
        }
    }

    function fallbackCopy(text) {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        try {
            document.execCommand('copy');
            showCopySuccess();
        } catch (err) {
            alert("Manual Copy Required: " + text);
        }
        document.body.removeChild(textArea);
    }

    function showCopySuccess() {
        const btn = document.getElementById('copy-action-btn');
        btn.innerText = "COPIED!";
        btn.style.background = "#fff";
        setTimeout(() => {
            btn.innerText = "COPY";
            btn.style.background = "var(--accent)";
        }, 1500);
    }

    // 3. START SESSION
    function startChat() {
        const name = document.getElementById('username-input').value.trim();
        if(!name) return alert("Ghost needs a name!");
        
        myUsername = name.toUpperCase();
        const targetId = document.getElementById('target-id').value.trim();
        
        document.getElementById('lobby-screen').style.display = 'none';
        document.getElementById('chat-screen').style.display = 'flex';
        
        if(targetId && targetId !== peer.id) {
            setupConnection(peer.connect(targetId));
        }
    }

    // 4. CONNECTION LOGIC
    function setupConnection(conn) {
        conn.on('open', () => {
            activeConnections[conn.peer] = conn;
            conn.send({type: 'HANDSHAKE', name: myUsername || "Ghost"});
        });
        
        conn.on('data', (data) => {
            if(data.type === 'GHOST_CHAT') {
                hideTyping();
                addMsg(data.name, data.data, 'peer');
            } 
            else if(data.type === 'HANDSHAKE') {
                peerIdToName[conn.peer] = data.name;
                addSystemMsg(`${data.name} connected.`);
                updateCount(); 
            }
            else if(data.type === 'TYPING') {
                data.isTyping ? showTyping(data.name) : hideTyping();
            }
        });
        
        conn.on('close', () => {
            delete activeConnections[conn.peer];
            updateCount(); 
            hideTyping();
        });
    }

    // 5. MESSAGING & TYPING
    const msgInput = document.getElementById('msg-input');
    let typingTimer;

    msgInput.addEventListener('input', () => {
        if(Object.keys(activeConnections).length === 0) return;
        Object.values(activeConnections).forEach(c => c.send({type: 'TYPING', isTyping: true, name: myUsername}));
        
        clearTimeout(typingTimer);
        typingTimer = setTimeout(() => {
            Object.values(activeConnections).forEach(c => c.send({type: 'TYPING', isTyping: false, name: myUsername}));
        }, 1500);
    });

    document.getElementById('send-btn').onclick = send;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') send(); };

    function send() {
        const text = msgInput.value.trim();
        if(!text) return;
        
        Object.values(activeConnections).forEach(c => {
            c.send({type: 'TYPING', isTyping: false, name: myUsername});
            c.send({type: 'GHOST_CHAT', name: myUsername, data: text});
        });
        
        addMsg(myUsername, text, 'me');
        msgInput.value = "";
    }

    function addMsg(s, t, type) {
        const box = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg-con ${type}`;
        div.innerHTML = `<span style="font-size:10px; color:#555;">${s}</span><div class="msg-bubble">${t}</div>`;
        box.appendChild(div);
        box.scrollTop = box.scrollHeight;
    }

    function addSystemMsg(text) {
        const box = document.getElementById('chat-box');
        box.insertAdjacentHTML('beforeend', `<div class="sys-msg">${text}</div>`);
        box.scrollTop = box.scrollHeight;
    }

    function showTyping(name) {
        document.getElementById('typer-name').innerText = name;
        document.getElementById('typing-indicator').style.display = 'block';
        document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
    }

    function hideTyping() {
        document.getElementById('typing-indicator').style.display = 'none';
    }

    function updateCount() {
        const count = Object.keys(activeConnections).length;
        document.getElementById('chat-header').innerText = `GHOST HUB (${count + 1}/5)`;
    }
</script>

</body>
</html>
